<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zaratan</title>
    <script type="module" src="./src/main.ts"></script>
  </head>
  <body class="gap-4 bg-stone-50 p-4 md:flex dark:bg-stone-950">
    <form id="params" class="md:max-w-sm">
      <label>
        <span>Seed</span>
        <input name="seed" type="number" required value="42" inputmode="numeric" />
      </label>
      <label>
        <span>Width</span>
        <input name="width" type="number" required value="1024" inputmode="numeric" />
      </label>
      <label>
        <span>Height</span>
        <input name="height" type="number" required value="1024" inputmode="numeric" />
      </label>
      <label>
        <span>Radius</span>
        <input name="radius" type="number" required value="128" inputmode="numeric" />
      </label>
      <button type="submit">Render</button>
    </form>
    <canvas id="canvas" class="w-full" role="img"></canvas>
  </body>
</html>
