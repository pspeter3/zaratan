<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zaratan</title>
    <link rel="stylesheet" href="./src/style.scss" />
    <script type="module" src="./src/main.ts"></script>
  </head>
  <body>
    <main class="container-fluid grid layout">
      <section>
        <header>
          <hgroup>
            <h1>Zaratan</h1>
            <p>Procedural regional map generator</p>
          </hgroup>
        </header>
        <form id="params">
          <label>
            Seed
            <input name="seed" type="number" value="42" inputmode="numeric" />
          </label>
          <label>
            Width
            <input name="width" type="number" value="1024" inputmode="numeric" />
          </label>
          <label>
            Height
            <input name="height" type="number" value="1024" inputmode="numeric" />
          </label>
          <label>
            Radius
            <input name="height" type="number" value="128" inputmode="numeric" />
          </label>
          <button type="submit">Render</button>
        </form>
        <button id="copy" class="outline secondary">Copy</button>
      </section>
      <section>
        <canvas id="canvas" role="img"></canvas>
      </section>
    </main>
  </body>
</html>
