<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zaratan</title>
    <script type="module" src="./src/main.ts"></script>
  </head>
  <body
    class="min-h-screen bg-stone-100 p-4 text-stone-950 antialiased sm:p-6 dark:bg-stone-950 dark:text-stone-50"
  >
    <div class="flex flex-col gap-6 md:flex-row md:items-start">
      <form id="params" class="flex w-full flex-col gap-5 md:max-w-sm md:shrink-0">
        <header class="flex flex-col gap-1">
          <h1 class="text-sm font-semibold tracking-tight text-stone-900 dark:text-stone-100">
            Parameters
          </h1>
          <p class="text-sm text-stone-600 dark:text-stone-400">
            Adjust the render inputs and generate a new output.
          </p>
        </header>
        <div class="flex flex-col gap-4">
          <label class="flex flex-col gap-1.5">
            <span class="text-sm font-medium text-stone-700 dark:text-stone-300">Seed</span>
            <input
              class="h-11 w-full rounded-sm border border-stone-300 bg-stone-50 px-3 text-sm text-stone-900 transition outline-none focus:border-teal-600 focus:ring-4 focus:ring-teal-500/15 dark:border-stone-700 dark:bg-stone-900 dark:text-stone-100 dark:focus:border-teal-400 dark:focus:ring-teal-400/15"
              name="seed"
              type="number"
              required
              value="42"
              inputmode="numeric"
            />
          </label>
          <label class="flex flex-col gap-1.5">
            <span class="text-sm font-medium text-stone-700 dark:text-stone-300">Width</span>
            <input
              class="h-11 w-full rounded-sm border border-stone-300 bg-stone-50 px-3 text-sm text-stone-900 transition outline-none focus:border-teal-600 focus:ring-4 focus:ring-teal-500/15 dark:border-stone-700 dark:bg-stone-900 dark:text-stone-100 dark:focus:border-teal-400 dark:focus:ring-teal-400/15"
              name="width"
              type="number"
              required
              value="1024"
              inputmode="numeric"
            />
          </label>
          <label class="flex flex-col gap-1.5">
            <span class="text-sm font-medium text-stone-700 dark:text-stone-300">Height</span>
            <input
              class="h-11 w-full rounded-sm border border-stone-300 bg-stone-50 px-3 text-sm text-stone-900 transition outline-none focus:border-teal-600 focus:ring-4 focus:ring-teal-500/15 dark:border-stone-700 dark:bg-stone-900 dark:text-stone-100 dark:focus:border-teal-400 dark:focus:ring-teal-400/15"
              name="height"
              type="number"
              required
              value="1024"
              inputmode="numeric"
            />
          </label>
          <label class="flex flex-col gap-1.5">
            <span class="text-sm font-medium text-stone-700 dark:text-stone-300">Radius</span>
            <input
              class="h-11 w-full rounded-sm border border-stone-300 bg-stone-50 px-3 text-sm text-stone-900 transition outline-none focus:border-teal-600 focus:ring-4 focus:ring-teal-500/15 dark:border-stone-700 dark:bg-stone-900 dark:text-stone-100 dark:focus:border-teal-400 dark:focus:ring-teal-400/15"
              name="radius"
              type="number"
              required
              value="128"
              inputmode="numeric"
            />
          </label>
        </div>
        <div class="flex flex-col gap-3">
          <button
            type="submit"
            class="inline-flex h-11 w-full items-center justify-center rounded-sm bg-teal-500 px-4 text-sm font-semibold text-white transition hover:bg-teal-600 focus-visible:ring-4 focus-visible:ring-teal-500/25 focus-visible:ring-offset-2 focus-visible:ring-offset-stone-100 focus-visible:outline-none active:bg-teal-700 dark:bg-teal-400 dark:hover:bg-teal-500 dark:focus-visible:ring-teal-400/25 dark:focus-visible:ring-offset-stone-950 dark:active:bg-teal-600"
          >
            Render
          </button>
          <button
            id="copy"
            type="button"
            class="inline-flex h-11 w-full items-center justify-center rounded-sm border border-stone-300 bg-stone-50 px-4 text-sm font-medium text-stone-700 transition hover:border-stone-400 hover:bg-stone-100 focus-visible:ring-4 focus-visible:ring-stone-400/20 focus-visible:ring-offset-2 focus-visible:ring-offset-stone-100 focus-visible:outline-none dark:border-stone-700 dark:bg-stone-900 dark:text-stone-200 dark:hover:border-stone-600 dark:hover:bg-stone-800 dark:focus-visible:ring-stone-500/25 dark:focus-visible:ring-offset-stone-950"
          >
            Copy
          </button>
        </div>
      </form>
      <div class="min-w-0 flex-1 pt-2">
        <canvas id="canvas" class="block w-full max-w-full rounded-sm" role="img"></canvas>
      </div>
    </div>
  </body>
</html>
